<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathGo! - Aplikasi Matematik Interaktif KSSR Malaysia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            min-height: 100vh;
        }
        h1, h2, h3, h4, .font-kids {
            font-family: 'Fredoka', sans-serif;
        }
        .screen { display: none; }
        .screen.active { display: block; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bounce-hover {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bounce-hover:hover {
            transform: translateY(-5px) scale(1.03);
        }
        .selected-answer {
            border-color: #F97316 !important;
            background-color: #FFEDD5 !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col justify-between">

    <nav id="app-nav" class="bg-white border-b-4 border-sky-200 px-4 py-3 sticky top-0 z-50 flex justify-between items-center hidden shadow-md">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="goToDashboard()">
            <div class="bg-amber-400 w-10 h-10 rounded-full flex items-center justify-center text-white font-black text-xl shadow-md animate-pulse">G</div>
            <span class="text-2xl font-black text-sky-500 tracking-wider">Math<span class="text-orange-500">Go</span></span>
        </div>
        
        <div class="flex items-center space-x-2">
            <div class="relative hidden md:block mr-2">
                <input type="text" id="global-search" onkeyup="handleGlobalSearch(event)" placeholder="Cari topik / Search topics..." class="bg-slate-100 rounded-full pl-8 pr-4 py-1.5 text-xs outline-none focus:ring-2 focus:ring-sky-400 font-bold w-48">
                <i class="fas fa-search absolute left-3 top-2.5 text-slate-400 text-xs"></i>
            </div>

            <select id="lang-select" onchange="switchLanguage(this.value)" class="bg-slate-100 text-xs font-black p-2 rounded-xl border-2 border-slate-200 cursor-pointer outline-none">
                <option value="ms">🇲🇾 BM</option>
                <option value="en">🇬🇧 EN</option>
            </select>
            
            <select id="role-select" onchange="navigateByRole(this.value)" class="bg-orange-100 text-xs font-black p-2 rounded-xl border-none text-orange-700 cursor-pointer outline-none">
                <option value="student">👦 Murid</option>
                <option value="parent">👨‍👩‍👦 Ibu Bapa</option>
                <option value="teacher">👩‍🏫 Guru</option>
                <option value="admin">⚙️ Admin</option>
            </select>

            <button onclick="logout()" class="text-slate-400 hover:text-red-500 text-lg p-2"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div id="notification-box" class="fixed top-16 right-4 z-50 bg-sky-500 text-white px-4 py-3 rounded-2xl shadow-xl flex items-center space-x-2 hidden transform transition-all duration-300">
        <i class="fas fa-bell animate-bounce"></i>
        <span id="notification-msg" class="text-xs font-black"></span>
    </div>

    <main class="flex-grow container mx-auto max-w-4xl p-4 flex flex-col justify-center">

        <div id="screen-splash" class="screen active text-center py-10">
            <div class="relative inline-block">
                <div class="w-44 h-44 bg-gradient-to-tr from-sky-400 via-amber-400 to-emerald-400 rounded-full flex items-center justify-center shadow-2xl mx-auto animate-bounce">
                    <i class="fas fa-robot text-white text-7xl"></i>
                </div>
                <span class="absolute -top-2 -right-2 bg-orange-500 text-white text-xs font-black px-3 py-1.5 rounded-full shadow">KSSR 2026</span>
            </div>
            <h1 class="text-6xl font-black text-sky-500 mt-6">Math<span class="text-orange-500">Go</span>!</h1>
            <p class="text-slate-500 font-bold mt-2" data-i18n="tagline">Pembelajaran Matematik Generasi Baru</p>
            <div class="mt-10">
                <button onclick="showScreen('screen-onboarding')" class="bg-emerald-500 hover:bg-emerald-600 text-white font-black px-12 py-4 rounded-3xl text-2xl shadow-xl border-b-8 border-emerald-700 bounce-hover cursor-pointer">
                    <span data-i18n="btn-start">Jom Mula!</span> <i class="fas fa-arrow-right ml-1"></i>
                </button>
            </div>
        </div>

        <div id="screen-onboarding" class="screen text-center max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl border-4 border-sky-100">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=GOBOT" class="w-28 h-28 mx-auto mb-4 bg-sky-100 rounded-full p-2 border-2 border-sky-300" alt="GOBOT">
            <h2 class="text-3xl font-black text-sky-500">Hai, Saya GOBOT!</h2>
            <p class="text-slate-600 font-bold text-sm mt-2 mb-8" data-i18n="gobot-intro">Rakan bijak matematik digital dan pemandu modul KSSR anda!</p>
            <div class="space-y-4">
                <button onclick="showScreen('screen-login')" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-black p-4 rounded-2xl shadow border-b-4 border-sky-700 bounce-hover cursor-pointer" data-i18n="btn-login-page">Log Masuk</button>
                <button onclick="showScreen('screen-register')" class="w-full bg-white text-sky-500 font-black p-4 rounded-2xl border-2 border-sky-300 hover:bg-sky-50 transition cursor-pointer" data-i18n="btn-register-page">Daftar Akaun Baharu</button>
            </div>
        </div>

        <div id="screen-login" class="screen max-w-sm mx-auto bg-white p-8 rounded-3xl shadow-xl border-4 border-sky-100">
            <h2 class="text-3xl font-black text-center text-slate-800 mb-6" data-i18n="login-title">Log Masuk</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-slate-600 mb-1" data-i18n="label-email">E-mel / Username ID</label>
                    <input type="email" id="login-email" value="murid@mathgo.my" class="w-full p-3 rounded-xl bg-slate-50 border-2 border-slate-200 outline-none font-bold text-slate-700 focus:border-sky-400">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-600 mb-1" data-i18n="label-password">Kata Laluan</label>
                    <input type="password" id="login-pass" value="123456" class="w-full p-3 rounded-xl bg-slate-50 border-2 border-slate-200 outline-none font-bold text-slate-700 focus:border-sky-400">
                </div>
                <button onclick="simulateAuth()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black p-4 rounded-2xl shadow-md border-b-4 border-emerald-700 mt-2 cursor-pointer" data-i18n="btn-login">Masuk Sekarang</button>
                <button onclick="showScreen('screen-onboarding')" class="w-full text-center text-slate-400 text-xs font-bold hover:underline cursor-pointer" data-i18n="btn-back">Kembali</button>
            </div>
        </div>

        <div id="screen-register" class="screen max-w-sm mx-auto bg-white p-8 rounded-3xl shadow-xl border-4 border-sky-100">
            <h2 class="text-3xl font-black text-center text-slate-800 mb-6" data-i18n="register-title">Daftar Akaun</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-slate-600 mb-1" data-i18n="reg-name">Nama Murid</label>
                    <input type="text" id="reg-student-name" placeholder="Aiman Safwan" class="w-full p-3 rounded-xl bg-slate-50 border-2 border-slate-200 font-bold text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-600 mb-1" data-i18n="label-email">E-mel Ibu Bapa</label>
                    <input type="email" placeholder="parent@gmail.com" class="w-full p-3 rounded-xl bg-slate-50 border-2 border-slate-200 font-bold text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-600 mb-1" data-i18n="label-password">Kata Laluan Baru</label>
                    <input type="password" placeholder="******" class="w-full p-3 rounded-xl bg-slate-50 border-2 border-slate-200 font-bold text-slate-700">
                </div>
                <button onclick="simulateAuth()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black p-4 rounded-2xl shadow-md border-b-4 border-orange-700 mt-2 cursor-pointer" data-i18n="btn-register">Selesai & Daftar</button>
                <button onclick="showScreen('screen-onboarding')" class="w-full text-center text-slate-400 text-xs font-bold hover:underline cursor-pointer" data-i18n="btn-back">Kembali</button>
            </div>
        </div>

        <div id="screen-dashboard" class="screen">
            <div class="bg-gradient-to-r from-sky-400 via-blue-500 to-indigo-500 rounded-3xl p-6 text-white shadow-xl mb-6 grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                <div class="flex items-center space-x-4">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Aiman" id="stud-avatar" class="w-16 h-16 bg-white rounded-full p-1 border-4 border-sky-200" alt="Avatar">
                    <div>
                        <h2 id="stud-name" class="text-2xl font-black tracking-wide">Aiman Safwan</h2>
                        <span class="bg-amber-400 text-slate-900 text-[10px] px-2.5 py-1 rounded-full font-black uppercase shadow-inner">LV 3 - Penjelajah</span>
                    </div>
                </div>
                <div class="flex justify-around bg-black/10 rounded-2xl p-2.5 border border-white/10 text-center">
                    <div>
                        <i class="fas fa-bolt text-amber-300 text-xl"></i>
                        <p class="text-[10px] text-sky-100 font-bold">XP</p>
                        <p id="hud-xp" class="font-black text-base">1,450</p>
                    </div>
                    <div class="border-l border-white/20"></div>
                    <div>
                        <i class="fas fa-coins text-yellow-300 text-xl"></i>
                        <p class="text-[10px] text-sky-100 font-bold">Koin</p>
                        <p id="hud-coins" class="font-black text-base">320</p>
                    </div>
                    <div class="border-l border-white/20"></div>
                    <div>
                        <i class="fas fa-heart text-rose-400 text-xl"></i>
                        <p class="text-[10px] text-sky-100 font-bold">Nyawa</p>
                        <p id="hud-hearts" class="font-black text-base">5/5</p>
                    </div>
                </div>
                <div class="text-right">
                    <button onclick="showScreen('screen-years')" class="w-full bg-emerald-400 hover:bg-emerald-500 text-white font-black px-6 py-3.5 rounded-2xl shadow border-b-4 border-emerald-600 bounce-hover text-md cursor-pointer">
                        <i class="fas fa-play-circle mr-1"></i> <span data-i18n="btn-learn-now">Mula Belajar</span>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 space-y-6">
                    <div class="bg-white p-5 rounded-3xl shadow border-2 border-amber-200 relative overflow-hidden">
                        <h3 class="text-lg font-black text-amber-500 mb-2"><i class="fas fa-calendar-check mr-1"></i> <span data-i18n="daily-challenge">Cabaran Hari Ini 🎯</span></h3>
                        <p class="text
